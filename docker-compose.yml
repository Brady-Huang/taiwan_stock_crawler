services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8888:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      bash -c "airflow db init &&
      airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin || true"
    environment: &airflow-common-env
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+pymysql://root:${MYSQL_PASSWORD}@mysql:3306/airflow_metadata
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+mysql+pymysql://root:${MYSQL_PASSWORD}@mysql:3306/airflow_metadata
      AIRFLOW__WEBSERVER__SECRET_KEY: super-secret
      AIRFLOW__CELERY__WORKER_LOG_SERVER_PORT: "8793"
      CELERY_ENABLE_UTC: "True"
      PYTHONPATH: /opt/airflow
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DB: ${MYSQL_DB}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile
    command: airflow webserver
    restart: always
    environment: *airflow-common-env
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: airflow scheduler
    restart: always
    environment: *airflow-common-env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: airflow celery worker
    restart: always
    environment: *airflow-common-env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  flower:
    build:
      context: .
      dockerfile: Dockerfile
    command: airflow celery flower
    restart: always
    environment: *airflow-common-env
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy

  fastapi-app:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    restart: always
    environment:
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DB: ${MYSQL_DB}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: ${REDIS_DB}
      PYTHONPATH: /opt/airflow
    ports:
      - "8000:8000"
    volumes:
      - ./src:/opt/airflow/src
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data: